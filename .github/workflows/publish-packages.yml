name: Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v4.0.0)"
        required: true
        type: string

concurrency:
  group: publish-atomic-packages
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  #  test-gate:
  #    name: Verify tests pass before publishing
  #    uses: ./.github/workflows/unit-tests-reusable.yml
  #    with:
  #      collect-coverage: false

  build:
    name: Build and get latest version
    #    needs: [ test-gate ]
    runs-on: ubuntu-latest
    outputs:
      SemVer: ${{ steps.set_version.outputs.SemVer }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version
        id: set_version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION="$RELEASE_TAG"
          # Remove 'v' prefix if present (e.g., v4.0.0 -> 4.0.0)
          VERSION="${VERSION#v}"
          echo "SemVer=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Semantic Version: $VERSION"


  hviktor-icons-abstractions:
    name: Hviktor.Icons.Abstractions
    uses: ./.github/workflows/publish-package-reusable.yml
    needs: [ build ]
    with:
      project_name: "Hviktor.Icons.Abstractions"
      version: ${{ needs.build.outputs.SemVer }}

  hviktor-abstractions:
    name: Hviktor.Abstractions
    uses: ./.github/workflows/publish-package-reusable.yml
    needs: [ build, hviktor-icons-abstractions ]
    with:
      project_name: "Hviktor.Abstractions"
      version: ${{ needs.build.outputs.SemVer }}

  hviktor-extensions:
    name: Hviktor.Extensions
    uses: ./.github/workflows/publish-package-reusable.yml
    needs: [ build, hviktor-abstractions ]
    with:
      project_name: "Hviktor.Extensions"
      version: ${{ needs.build.outputs.SemVer }}

  hviktor-icons:
    name: Hviktor.Icons
    uses: ./.github/workflows/publish-package-reusable.yml
    needs: [ build, hviktor-icons-abstractions ]
    with:
      project_name: "Hviktor.Icons"
      version: ${{ needs.build.outputs.SemVer }}

  hviktor:
    name: Hviktor
    uses: ./.github/workflows/publish-package-reusable.yml
    needs: [ build, hviktor-abstractions, hviktor-icons-abstractions ]
    with:
      project_name: "Hviktor"
      version: ${{ needs.build.outputs.SemVer }}

  update-docs:
    name: Trigger documentation version update
    runs-on: ubuntu-latest
    needs: [ build, hviktor, hviktor-extensions, hviktor-icons ]
    steps:
      - name: Trigger update-docs workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.SemVer }}
        run: |
          gh workflow run update-docs.yml --repo "${{ github.repository }}" --field version="$VERSION"
          echo "::notice::Triggered update-docs for version $VERSION"

  cleanup-on-failure:
    name: Clean up published packages on failure
    runs-on: ubuntu-latest
    needs: [ build, hviktor-icons-abstractions, hviktor-abstractions, hviktor-extensions, hviktor-icons, hviktor ]
    if: ${{ failure() }}
    permissions:
      packages: write
    steps:
      - name: Delete published packages for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.SemVer }}
          OWNER: ${{ github.repository_owner }}
        run: |
          PACKAGES=(
            "Hviktor.Icons.Abstractions"
            "Hviktor.Abstractions"
            "Hviktor.Extensions"
            "Hviktor.Icons"
            "Hviktor"
          )

          for PACKAGE in "${PACKAGES[@]}"; do
            echo "Checking for $PACKAGE version $VERSION..."

            # Get the package version ID
            VERSION_ID=$(gh api \
              "orgs/$OWNER/packages/nuget/$PACKAGE/versions" \
              --jq ".[] | select(.name == \"$VERSION\") | .id" 2>/dev/null || true)

            if [ -n "$VERSION_ID" ]; then
              echo "Deleting $PACKAGE@$VERSION (version ID: $VERSION_ID)..."
              gh api --method DELETE \
                "orgs/$OWNER/packages/nuget/$PACKAGE/versions/$VERSION_ID" \
                2>/dev/null && echo "::notice::Deleted $PACKAGE@$VERSION" \
                || echo "::warning::Failed to delete $PACKAGE@$VERSION"
            else
              echo "Package $PACKAGE@$VERSION not found, skipping."
            fi
          done

