name: Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v4.0.0)"
        required: true
        type: string

concurrency:
  group: publish-atomic-packages
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  packages: write
  id-token: write

env:
  DOTNET_VERSION: '10.0.x'
  HVIKTOR_PACKAGES: |-
    Hviktor.Icons.Abstractions
    Hviktor.Abstractions
    Hviktor.Extensions
    Hviktor.Icons
    Hviktor

jobs:
  build:
    name: Build and pack all Hviktor packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set version
        id: set_version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Building version $VERSION"

      - name: Ensure NuGet packages directory exists
        run: mkdir -p "${NUGET_PACKAGES:-$HOME/.nuget/packages}"

      - name: Setup .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Build Vite assets for projects with package.json
        run: |
          set -euo pipefail
          for dir in Hviktor Hviktor.Icons; do
            if [ ! -f "$dir/package.json" ]; then
              continue
            fi
            echo "::group::pnpm build for $dir"
            pnpm install --prefix "$dir" --prefer-offline
            if grep -q '"build:prod"' "$dir/package.json"; then
              pnpm build:prod --prefix "$dir"
            elif grep -q '"build:dev"' "$dir/package.json"; then
              pnpm build:dev --prefix "$dir"
            else
              echo "No build script in $dir/package.json, skipping"
            fi
            echo "::endgroup::"
          done

      - name: Pack all Hviktor.* packages
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            echo "::group::Packing $proj@$VERSION"
            dotnet pack "$proj/$proj.csproj" \
              -c Release \
              -p:Version="$VERSION" \
              -p:UseInternalProjectReferences=true \
              -p:IncludeSymbols=false \
              -o artifacts
            echo "::endgroup::"
          done <<< "$HVIKTOR_PACKAGES"
          echo "Packed artifacts:"
          ls -la artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: nupkgs
          path: artifacts/*.nupkg

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [ build ]
    environment: nuget
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: nupkgs
          path: artifacts

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push all packages
        env:
          VERSION: ${{ needs.build.outputs.version }}
          NUGET_SOURCE: ${{ vars.NUGET_SOURCE }}
          API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            echo "::group::Pushing $proj@$VERSION"
            dotnet nuget push "artifacts/$proj.$VERSION.nupkg" \
              --api-key "$API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate
            echo "::endgroup::"
          done <<< "$HVIKTOR_PACKAGES"
          echo "::notice::All packages pushed to $NUGET_SOURCE"

  update-docs:
    name: Trigger documentation version update
    runs-on: ubuntu-latest
    needs: [ build, publish ]
    steps:
      - name: Trigger update-docs workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh workflow run update-docs.yml --repo "${{ github.repository }}" --field version="$VERSION"
          echo "::notice::Triggered update-docs for version $VERSION"

  cleanup-on-failure:
    name: Clean up published packages on failure
    runs-on: ubuntu-latest
    needs: [ build, publish ]
    if: ${{ failure() }}
    permissions:
      packages: write
    steps:
      - name: Delete published packages for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set +e
          while IFS= read -r PACKAGE; do
            [ -z "$PACKAGE" ] && continue
            VERSION_ID=$(gh api \
              "orgs/$OWNER/packages/nuget/$PACKAGE/versions" \
              --jq ".[] | select(.name == \"$VERSION\") | .id" 2>/dev/null)
            if [ -n "$VERSION_ID" ]; then
              gh api --method DELETE \
                "orgs/$OWNER/packages/nuget/$PACKAGE/versions/$VERSION_ID" \
                && echo "::notice::Deleted $PACKAGE@$VERSION" \
                || echo "::warning::Failed to delete $PACKAGE@$VERSION"
            else
              echo "Package $PACKAGE@$VERSION not found, skipping."
            fi
          done <<< "$HVIKTOR_PACKAGES"
