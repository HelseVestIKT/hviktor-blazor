name: SonarQube Analysis (Reusable Workflow)

on:
  workflow_call:
    inputs:
      include-coverage:
        description: 'Include test coverage in analysis'
        required: false
        default: true
        type: boolean
      coverage-artifact-name:
        description: 'Name of the coverage artifact to download'
        required: false
        default: 'coverage-report'
        type: string
      dotnet-version:
        description: '.NET SDK version to use'
        required: false
        default: '10.0.x'
        type: string
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 15
        type: number
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  analyze:
    name: SonarQube Analysis
    timeout-minutes: ${{ inputs.timeout-minutes }}
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache dotnet tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ hashFiles('.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-dotnet-tools-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install SonarScanner
        run: dotnet tool update --global dotnet-sonarscanner

      - name: Download Coverage Report
        if: ${{ inputs.include-coverage }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        continue-on-error: true
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: .

      - name: Check for coverage file
        if: ${{ inputs.include-coverage }}
        id: check-coverage
        run: |
          if [ -f coverage.xml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Coverage report found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No coverage report found"
          fi

      - name: Restore
        run: dotnet restore

      - name: SonarQube Begin (with coverage)
        if: ${{ inputs.include-coverage && steps.check-coverage.outputs.exists == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_HOST_ORG: ${{ vars.SONAR_HOST_ORG }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_EXCLUSIONS: ${{ vars.SONAR_EXCLUSIONS }}
          SONAR_COVERAGE_EXCLUSIONS: ${{ vars.SONAR_COVERAGE_EXCLUSIONS }}
        run: |
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_HOST_ORG" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
            /d:sonar.exclusions="$SONAR_EXCLUSIONS" \
            /d:sonar.coverage.exclusions="$SONAR_COVERAGE_EXCLUSIONS"

      - name: SonarQube Begin (without coverage)
        if: ${{ !inputs.include-coverage || steps.check-coverage.outputs.exists != 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_HOST_ORG: ${{ vars.SONAR_HOST_ORG }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_EXCLUSIONS: ${{ vars.SONAR_EXCLUSIONS }}
          SONAR_COVERAGE_EXCLUSIONS: ${{ vars.SONAR_COVERAGE_EXCLUSIONS }}
        run: |
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_HOST_ORG" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.exclusions="$SONAR_EXCLUSIONS" \
            /d:sonar.coverage.exclusions="$SONAR_COVERAGE_EXCLUSIONS"

      - name: Build
        run: dotnet build --configuration Debug --no-restore --no-incremental

      - name: SonarQube End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
