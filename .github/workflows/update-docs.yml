name: Update Documentation Version

# Triggered by publish-packages.yml after all packages are published.
# Creates a PR bumping Hviktor package versions in Documentation.csproj.
# When merged, deploy-docs and generate-wiki run automatically.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g., 5.0.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Bump Hviktor versions in Documentation
    runs-on: ubuntu-latest
    if: inputs.version != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Read version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Documentation version: $VERSION"

      - name: Verify packages exist on NuGet registry
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUGET_SOURCE="https://nuget.pkg.github.com/HelseVestIKT/index.json"
          for PKG in Hviktor Hviktor.Extensions Hviktor.Icons; do
            echo "Checking $PKG@$VERSION..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u "${{ github.actor }}:$GH_TOKEN" \
              "$NUGET_SOURCE$PKG/$VERSION.json" 2>/dev/null || echo "000")
            if [ "$STATUS" != "200" ]; then
              # Fallback: try dotnet nuget search
              dotnet nuget add source "$NUGET_SOURCE" --name check --username "${{ github.actor }}" --password "$GH_TOKEN" --store-password-in-clear-text 2>/dev/null || true
              FOUND=$(dotnet package search "$PKG" --source check --exact-match --format json 2>/dev/null | grep -c "\"$VERSION\"" || echo "0")
              if [ "$FOUND" = "0" ]; then
                echo "::error::Package $PKG@$VERSION not found on registry"
                exit 1
              fi
            fi
            echo "::notice::$PKG@$VERSION verified"
          done

      - name: Read current version from Directory.Packages.props
        id: current
        run: |
          CURRENT=$(grep -oP 'Include="Hviktor" Version="\K[^"]+' Directory.Packages.props)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "::notice::Current version: $CURRENT"

      - name: Update Directory.Packages.props
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::notice::Version already up to date ($NEW_VERSION), skipping."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          BRANCH="docs/v$NEW_VERSION"

          # Create the branch from main
          MAIN_SHA=$(gh api "/repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha')
          gh api --method POST "/repos/${{ github.repository }}/git/refs" \
            -f ref="refs/heads/$BRANCH" \
            -f sha="$MAIN_SHA" 2>/dev/null || true

          # Get the current file from the branch
          FILE_RESPONSE=$(gh api \
            "/repos/${{ github.repository }}/contents/Directory.Packages.props?ref=$BRANCH")
          CURRENT_CONTENT=$(echo "$FILE_RESPONSE" | jq -r '.content' | base64 -d)

          # Apply the version updates
          UPDATED_CONTENT="$CURRENT_CONTENT"
          for PKG in Hviktor Hviktor.Abstractions Hviktor.Extensions Hviktor.Icons Hviktor.Icons.Abstractions; do
            UPDATED_CONTENT=$(echo "$UPDATED_CONTENT" \
              | sed "s|<PackageVersion Include=\"$PKG\" Version=\"[^\"]*\"|<PackageVersion Include=\"$PKG\" Version=\"$NEW_VERSION\"|g")
          done

          if [ "$CURRENT_CONTENT" = "$UPDATED_CONTENT" ]; then
            echo "::notice::Versions already set to $NEW_VERSION, no changes needed"
            echo "skip=true" >> $GITHUB_ENV
          else
            # Use the Contents API to create a verified (signed) bot commit
            FILE_SHA=$(echo "$FILE_RESPONSE" | jq -r '.sha')

            gh api \
              --method PUT \
              "/repos/${{ github.repository }}/contents/Directory.Packages.props" \
              -f message="chore(docs): bump Hviktor packages to $NEW_VERSION" \
              -f content="$(echo -n "$UPDATED_CONTENT" | base64 -w 0)" \
              -f sha="$FILE_SHA" \
              -f branch="$BRANCH" > /dev/null

            echo "::notice::Pushed verified version update to $BRANCH"
          fi

      - name: Create pull request
        if: env.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "docs/v$NEW_VERSION" \
            --title "chore(docs): bump Hviktor packages to $NEW_VERSION" \
            --body "Bumps Hviktor package versions in \`Directory.Packages.props\` from \`$CURRENT_VERSION\` to \`$NEW_VERSION\`.

          When merged, this will trigger documentation deployment and wiki generation." \
            --label "documentation" \
            --label "automated" 2>/dev/null || \
          echo "::notice::PR already exists for docs/v$NEW_VERSION"
