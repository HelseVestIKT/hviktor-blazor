name: Generate Wiki

on:
  workflow_run:
    workflows: [ "Deploy Documentation to GitHub Pages" ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki
  cancel-in-progress: true

env:
  NUGET_SOURCE: https://nuget.pkg.github.com/HelseVestIKT/index.json
  NUGET_USER: ${{ github.actor }}
  NUGET_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DOTNET_VERSION: '10.0.x'

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout wiki
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore WikiGen/WikiGen.csproj

      - name: Run WikiGen
        run: dotnet run --project WikiGen/WikiGen.csproj -- "${{ github.workspace }}/wiki"

      - name: Push wiki changes
        working-directory: wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update wiki from ${{ github.sha }}"
            git push
          fi
