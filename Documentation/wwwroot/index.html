<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentation</title>
    <meta name="description" content="Hviktor Documentation" />
    <base href="/" />

    <!-- Inline critical CSS for loading skeleton to avoid render-blocking stylesheet -->
    <style>
      .hvikt-loading {
        display: grid;
        grid-template-rows: 3.5rem 1fr;
        height: 100dvh;
        font-family:
          "Albert Sans",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--ds-color-accent-text-subtle);
        background: var(--ds-color-neutral-background-default);
      }

      .hvikt-loading__nav {
        min-height: var(--navbar-height);
      }

      .hvikt-loading__body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
      }

      .component-page__demo-container svg,
      .hvikt-loading__body svg {
        overflow: visible;
        shape-rendering: geometricPrecision;
        stroke-linecap: round;
      }

      @media (prefers-reduced-motion: reduce) {
        .component-page__demo-container svg,
        .hvikt-loading__body svg {
          animation-play-state: paused !important;
        }
      }
    </style>

    <!-- Inline theme detection to avoid FOUC, before any rendering -->
    <script>
      (function () {
        const t = localStorage.getItem("color-scheme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-color-scheme", t);
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.setAttribute("data-color-scheme", "dark");
        } else {
          document.documentElement.setAttribute("data-color-scheme", "light");
        }
      })();
    </script>

    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    />

    <!-- Preload and apply stylesheets (split for parallel download) -->
    <link rel="preload" href="styles/index.css" as="style" />
    <link rel="preload" href="styles/tailwind.min.css" as="style" />
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="stylesheet" href="styles/tailwind.min.css" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="favicon-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link href="manifest.json" rel="manifest" crossorigin="use-credentials" />

    <!-- Preload Blazor framework to start downloading early -->
    <link rel="modulepreload" href="_framework/blazor.webassembly.js" />
  </head>

    <script>
      // Cache boot resources in Cache API for fast repeat loads
      const cacheName = "blazor-resources";
      // noinspection JSUnresolvedReference
      Blazor.start({
        loadBootResource: function (type, name, defaultUri, integrity) {
          // dotnetjs must return a URI string or null; cannot return a Response
          if (type === "dotnetjs") {
            return defaultUri;
          }

          // Only cache binary resources (wasm runtime and assemblies)
          if (type !== "dotnetwasm" && type !== "assembly") {
            return null;
          }

          return (async function () {
            const cache = await caches.open(cacheName);
            const cached = await cache.match(defaultUri);
            if (cached) {
              return cached;
            }
            const response = await fetch(defaultUri, {
              integrity: integrity,
              cache: "no-cache",
            });
            if (response.ok) {
              await cache.put(defaultUri, response.clone());
            }
            return response;
          })();
        },
      });
      navigator.serviceWorker?.register("service-worker.js");
    </script>
